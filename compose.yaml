services:
  api:
    image: ghcr.io/mars1836/codelife-academy-be:latest
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 160m

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: codelife
      POSTGRES_PASSWORD: codelife
      POSTGRES_DB: codelife
    command: ["postgres", "-c", "shared_buffers=64MB", "-c", "max_connections=30"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codelife -d codelife"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 320m

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 96m

volumes:
  postgres_data:
